# === harman custom keybinds ===
# apps
bind = SUPER, Space, exec, ghostty
bind = SUPER, E, exec, firefox
bind = SUPER, B, exec, dolphin
bind = SUPER, Q, killactive
bind = SUPER, F, fullscreen

# widgets (harman quickshell)
bind = SUPER, A, exec, quickshell ipc call launcher toggle
bind = SUPER, M, exec, quickshell ipc call music toggle
bind = SUPER, D, exec, quickshell ipc call dashboard toggle
bind = SUPER, W, exec, quickshell ipc call wallpaper toggle
bind = SUPER SHIFT, W, exec, bash ~/.config/scripts/harman-wallpaper.sh

# window management
bind = SUPER, T, togglefloating
bind = SUPER, V, togglespecialworkspace
bind = SUPER SHIFT, V, movetoworkspace, special
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# volume + brightness (5%)
binde = , XF86AudioMute, exec, amixer set Master toggle
binde = , XF86AudioLowerVolume, exec, amixer set Master 5%-
binde = , XF86AudioRaiseVolume, exec, amixer set Master 5%+
binde = , F1, exec, amixer set Master toggle
binde = , F2, exec, amixer set Master 5%-
binde = , F3, exec, amixer set Master 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

# screenshot + recording
bind = , Print, exec, grim ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" /tmp/screenshot.png && wl-copy < /tmp/screenshot.png && cp /tmp/screenshot.png ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png
bind = SUPER, R, exec, gpu-screen-recorder -w screen -f 30 -a default_output -o ~/Videos/Recordings/$(date +%Y-%m-%d_%H-%M-%S).mp4 & notify-send "Recording Started"
bind = SUPER CTRL, R, exec, bash ~/.config/scripts/stop-recording.sh

# floating terminal size

# rice switcher
bind = SUPER SHIFT, T, exec, bash ~/.config/scripts/rice-switcher.sh
bind = SUPER SHIFT, Space, exec, [float;size 700 400;center] foot
